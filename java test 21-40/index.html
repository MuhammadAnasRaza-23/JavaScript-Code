<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMIT Mastery Quiz: Chapters 21-40</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            transition: background-color 0.4s; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
        }
        #quiz-container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            max-width: 600px; 
            width: 90%; 
            margin: 20px 0;
        }
        .option-btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            background: white; 
            cursor: pointer; 
            text-align: left; 
            transition: 0.2s; 
            font-size: 16px;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f8f9fa;
        }
        .correct-selection { background-color: #d4edda !important; border-color: #28a745 !important; font-weight: bold; color: #155724; }
        .wrong-selection { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; opacity: 0.7; }
        #next-btn { 
            margin-top: 20px; 
            width: 100%; 
            padding: 15px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            display: none; 
            font-size: 16px;
            font-weight: bold;
        }
        #next-btn:hover { background: #0056b3; }
        .summary-card { 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
            margin-bottom: 5px; 
            background: #fafafa;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="question-screen">
        <h3 id="progress" style="color: #555;"></h3>
        <p id="question-text" style="font-size: 20px; font-weight: 600; min-height: 50px;"></p>
        <div id="options-container"></div>
        <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
    </div>
    
    <div id="result-screen" style="display:none;">
        <h2>Quiz Results</h2>
        <p id="final-stats" style="font-size: 18px; font-weight: bold; color: #333;"></p>
        <div id="summary-report" style="max-height: 400px; overflow-y: auto; text-align: left;"></div>
        <button onclick="location.reload()" style="width:100%; padding:15px; margin-top:20px; cursor:pointer; background:#333; color:white; border-radius:8px; font-size:16px;">Restart with New Questions</button>
    </div>
</div>

<script>
    const questionPool = [
        { q: "Ch 21: Which method converts a string to all lowercase?", options: ["toLowerCase()", "toLower()", "lowerCase()", "toLowerString()"], a: "toLowerCase()" },
        { q: "Ch 21: How do you change a string to all uppercase?", options: ["toUpperCase()", "toUpper()", "upperCase()", "toUpperString()"], a: "toUpperCase()" },
        { q: "Ch 21: If you lowercase the string 'KaRaChI', what is the result?", options: ["karachi", "KARACHI", "Karachi", "KaRaChI"], a: "karachi" },
        { q: "Ch 22: Which property returns the number of characters in a string?", options: [".length", ".size", ".count", ".total"], a: ".length" },
        { q: "Ch 22: Which method copies a section of a string without modifying the original?", options: ["slice()", "cut()", "part()", "split()"], a: "slice()" },
        { q: "Ch 22: In slice(2, 5), the second number (5) specifies what?", options: ["The first character NOT to be copied", "The total characters to copy", "The last character to be copied", "The start index"], a: "The first character NOT to be copied" },
        { q: "Ch 23: Which method finds the starting index of a specific segment in a string?", options: ["indexOf()", "find()", "search()", "locate()"], a: "indexOf()" },
        { q: "Ch 23: What does indexOf() return if the target segment is NOT found?", options: ["-1", "0", "null", "undefined"], a: "-1" },
        { q: "Ch 23: To find the LAST instance of a segment in a string, you use:", options: ["lastIndexOf()", "indexOfLast()", "findLast()", "searchLast()"], a: "lastIndexOf()" },
        { q: "Ch 24: How do you get a single character at a specific index location?", options: ["charAt()", "charOf()", "indexAt()", "getChar()"], a: "charAt()" },
        { q: "Ch 24: How do you target the very last character of a string named 'text'?", options: ["text.charAt(text.length - 1)", "text.charAt(last)", "text.slice(-1)", "text.charAt(text.length)"], a: "text.charAt(text.length - 1)" },
        { q: "Ch 24: What is the index of the first character in any string?", options: ["0", "1", "-1", "undefined"], a: "0" },
        { q: "Ch 25: Which method is used to swap a segment of a string with something else?", options: ["replace()", "swap()", "change()", "sub()"], a: "replace()" },
        { q: "Ch 25: By default, the replace() method replaces how many instances of the target string?", options: ["Only the first instance", "All instances", "The last instance", "None"], a: "Only the first instance" },
        { q: "Ch 25: To replace ALL instances using replace(), what must you use?", options: ["A regular expression with a /g flag", "A loop", "replaceAll() method", "An array"], a: "A regular expression with a /g flag" },
        { q: "Ch 26: Which method rounds a number to the nearest integer (.5 rounds up)?", options: ["Math.round()", "Math.ceil()", "Math.floor()", "Math.near()"], a: "Math.round()" },
        { q: "Ch 26: Which method forces a decimal like 1.0001 to round DOWN to 1?", options: ["Math.floor()", "Math.round()", "Math.ceil()", "Math.down()"], a: "Math.floor()" },
        { q: "Ch 26: Which method always rounds a number UP, making 0.000001 into 1?", options: ["Math.ceil()", "Math.round()", "Math.floor()", "Math.up()"], a: "Math.ceil()" },
        { q: "Ch 27: Math.random() generates a pseudo-random decimal ranging from 0 up to, but not including:", options: ["1", "10", "100", "0.99"], a: "1" },
        { q: "Ch 27: How do you generate a random integer between 1 and 6?", options: ["Math.floor(Math.random() * 6) + 1", "Math.random(6) + 1", "Math.round(Math.random() * 6)", "Math.ceil(Math.random() * 5)"], a: "Math.floor(Math.random() * 6) + 1" },
        { q: "Ch 27: Math.random() produces a decimal with how many decimal places?", options: ["16", "10", "2", "8"], a: "16" },
        { q: "Ch 28: Which function extracts the integer from a string like '24.9876'?", options: ["parseInt()", "toInteger()", "Number()", "int()"], a: "parseInt()" },
        { q: "Ch 28: Which function extracts the floating-point number from a string?", options: ["parseFloat()", "parseDecimal()", "Float()", "decimal()"], a: "parseFloat()" },
        { q: "Ch 28: What is the result of parseInt('1.999')?", options: ["1", "2", "1.999", "NaN"], a: "1" },
        { q: "Ch 29: How do you reliably convert a number variable into a string?", options: ["toString()", "String()", "toStr()", "convertToString()"], a: "toString()" },
        { q: "Ch 29: What happens if you add a string '2' to a number 2 ('2' + 2)?", options: ["It concatenates to '22'", "It adds to 4", "It throws an error", "It evaluates to NaN"], a: "It concatenates to '22'" },
        { q: "Ch 29: Which tool converts a string to a number, preserving decimals without rounding?", options: ["Number()", "parseInt()", "Math.floor()", "Math.ceil()"], a: "Number()" },
        { q: "Ch 30: Which method controls the length of decimals (e.g., formats to 2 decimal places)?", options: ["toFixed()", "toDecimal()", "limitDecimal()", "roundTo()"], a: "toFixed()" },
        { q: "Ch 30: What data type does the toFixed() method return?", options: ["A string", "A number", "An array", "An integer"], a: "A string" },
        { q: "Ch 30: What is the potential issue with toFixed() in older browsers?", options: ["It sometimes rounds numbers ending in 5 inconsistently", "It crashes", "It removes integers", "It converts numbers to arrays"], a: "It sometimes rounds numbers ending in 5 inconsistently" },
        { q: "Ch 31: How do you create an object representing the current date and time?", options: ["new Date()", "Date.now()", "getCurrentDate()", "Time()"], a: "new Date()" },
        { q: "Ch 31: The Date object gathers its time information from where?", options: ["The user's computer system", "The web server", "The internet", "JavaScript's internal clock"], a: "The user's computer system" },
        { q: "Ch 31: Can you use string methods like slice() directly on a Date object?", options: ["No, it must be converted to a string first", "Yes, it behaves just like a string", "Only if it is formatted", "Yes, but only in strict mode"], a: "No, it must be converted to a string first" },
        { q: "Ch 32: When using getMonth(), what number does December return?", options: ["11", "12", "10", "0"], a: "11" },
        { q: "Ch 32: Which method returns the number of milliseconds since January 1, 1970?", options: ["getTime()", "getMilliseconds()", "getEpoch()", "getSeconds()"], a: "getTime()" },
        { q: "Ch 32: getDay() returns the day of the week as a number. What is 0?", options: ["Sunday", "Monday", "Saturday", "January"], a: "Sunday" },
        { q: "Ch 32: Which method gives you a 4-digit number for the year?", options: ["getFullYear()", "getYear()", "getFullYearString()", "year()"], a: "getFullYear()" },
        { q: "Ch 33: How do you specify a date for June 30, 2035?", options: ["new Date('June 30, 2035')", "new Date(2035, 30, 6)", "Date.set('2035/06/30')", "new Date('30/06/2035')"], a: "new Date('June 30, 2035')" },
        { q: "Ch 33: To calculate the difference between two dates, what mathematical unit do you subtract?", options: ["Milliseconds", "Seconds", "Hours", "Days directly"], a: "Milliseconds" },
        { q: "Ch 34: Which method changes the year of an existing Date object?", options: ["setFullYear()", "setYear()", "changeYear()", "year()"], a: "setFullYear()" },
        { q: "Ch 34: Which method sets the minutes of a Date object?", options: ["setMinutes()", "setMins()", "changeMinutes()", "minutes()"], a: "setMinutes()" },
        { q: "Ch 34: If you want to change the day of the month on an existing Date object, you use:", options: ["setDate()", "setDay()", "changeDate()", "setMonthDay()"], a: "setDate()" },
        { q: "Ch 35: What is a block of code that does something robotically whenever you invoke its name?", options: ["A function", "A loop", "An array", "A variable"], a: "A function" },
        { q: "Ch 35: How do you call or execute a function named 'tellTime'?", options: ["tellTime();", "call tellTime;", "run tellTime();", "execute tellTime();"], a: "tellTime();" },
        { q: "Ch 35: Where are functions typically placed in HTML to ensure they load before being called?", options: ["In an external JS file or HTML head section", "Inside paragraphs", "At the very top of CSS", "Inside image tags"], a: "In an external JS file or HTML head section" },
        { q: "Ch 36: Data placed inside the parentheses of a function call is known as an:", options: ["Argument", "Parameter", "Variable", "Operator"], a: "Argument" },
        { q: "Ch 36: The variable that 'catches' the data in the function definition is known as a:", options: ["Parameter", "Argument", "Return", "Block"], a: "Parameter" },
        { q: "Ch 36: Can you pass multiple arguments to a function?", options: ["Yes, separated by commas", "No, only one", "Only if they are strings", "Yes, separated by semicolons"], a: "Yes, separated by commas" },
        { q: "Ch 37: Which keyword is used to pass data back from a function to the calling code?", options: ["return", "give", "output", "send"], a: "return" },
        { q: "Ch 37: Can you assign the result of a function directly to a variable? (e.g., var total = calcTot();)", options: ["Yes", "No", "Only for strings", "Only in loops"], a: "Yes" },
        { q: "Ch 38: A variable declared in the main body of your code (outside any function) has:", options: ["Global scope", "Local scope", "Function scope", "Block scope"], a: "Global scope" },
        { q: "Ch 38: A variable declared explicitly with 'var' INSIDE a function has:", options: ["Local scope", "Global scope", "Constant scope", "Undefined scope"], a: "Local scope" },
        { q: "Ch 38: Can a local variable have the exact same name as a global variable without altering the global variable?", options: ["Yes", "No", "Only if it is a number", "Only in strict mode"], a: "Yes" },
        { q: "Ch 39: Which statement is an elegant alternative to long if/else if chains?", options: ["switch", "while", "for", "do...while"], a: "switch" },
        { q: "Ch 39: In a switch statement, what keyword is used to specify a condition to try?", options: ["case", "if", "when", "check"], a: "case" },
        { q: "Ch 39: A switch statement evaluates a variable placed where?", options: ["Inside parentheses next to the word 'switch'", "Inside curly brackets", "After the case", "Inside a string"], a: "Inside parentheses next to the word 'switch'" },
        { q: "Ch 40: In a switch statement, what prevents the code from executing the cases below a true case?", options: ["break", "stop", "exit", "return"], a: "break" },
        { q: "Ch 40: What keyword acts like 'else' in a switch statement, executing if no cases match?", options: ["default", "else", "finally", "catch"], a: "default" },
        { q: "Ch 40: Is the 'default' code block mandatory in a switch statement?", options: ["No, it is optional", "Yes, absolutely", "Only if there are more than 3 cases", "Only inside functions"], a: "No, it is optional" },
        { q: "Ch 40: Why is it common practice to place a break statement after the last case, even if not strictly needed?", options: ["To prevent errors if another case is added later", "Because JS will crash without it", "It is required by the browser", "It speeds up the code"], a: "To prevent errors if another case is added later" }
    ];

    let selectedQuestions = [];
    let currentIdx = 0;
    let score = 0; 
    let currentAttempts = 0;
    let report = [];

    function shuffle(array) { 
        let newArray = [...array];
        return newArray.sort(() => Math.random() - 0.5); 
    }

    function initQuiz() {
        let shuffledPool = shuffle(questionPool);
        selectedQuestions = shuffledPool.slice(0, 40);
        
        currentIdx = 0;
        score = 0;
        report = [];
        loadQuestion();
    }

    function loadQuestion() {
        currentAttempts = 0; 
        const qData = selectedQuestions[currentIdx];
        
        document.getElementById("progress").innerText = `Question ${currentIdx + 1} of 40`;
        document.getElementById("question-text").innerText = qData.q;
        
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        
        shuffle(qData.options).forEach(opt => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.classList.add("option-btn");
            btn.onclick = () => checkAnswer(opt, btn);
            container.appendChild(btn);
        });
        
        document.getElementById("next-btn").style.display = "none";
        document.body.style.backgroundColor = "#f0f2f5";
    }

    function checkAnswer(selected, btn) {
        const correct = selectedQuestions[currentIdx].a;
        const btns = document.querySelectorAll(".option-btn");

        if (selected === correct) {
            btn.classList.add("correct-selection");
            document.body.style.backgroundColor = "#d4edda"; 
            
            btns.forEach(b => b.disabled = true);
            
            if (currentAttempts === 0) {
                score++;
                report.push({ q: selectedQuestions[currentIdx].q, status: `<span style="color: #28a745; font-weight: bold;">Correct on 1st try!</span>` });
            } else {
                report.push({ q: selectedQuestions[currentIdx].q, status: `<span style="color: #d39e00; font-weight: bold;">Correct after ${currentAttempts + 1} tries.</span>` });
            }
            
            document.getElementById("next-btn").style.display = "block";
            
        } else {
            btn.classList.add("wrong-selection");
            document.body.style.backgroundColor = "#f8d7da"; 
            btn.disabled = true;
            currentAttempts++;
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < selectedQuestions.length) {
            loadQuestion();
        } else {
            showSummary();
        }
    }

    function showSummary() {
        document.getElementById("question-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.body.style.backgroundColor = "#f0f2f5";
        
        const percentage = Math.round((score / 40) * 100);
        document.getElementById("final-stats").innerText = `Final Score: ${score} out of 40 on the first try (${percentage}%)`;
        const reportContainer = document.getElementById("summary-report");
        reportContainer.innerHTML = "";
        report.forEach((r, index) => {
            reportContainer.innerHTML += `
                <div class="summary-card">
                    <p style="margin: 0 0 5px 0; font-size: 14px;"><strong>${index + 1}. ${r.q}</strong></p>
                    <p style="margin: 0; font-size: 14px;">${r.status}</p>
                </div>
            `;
        });
    }

    initQuiz();
</script>
</body>
</html>
